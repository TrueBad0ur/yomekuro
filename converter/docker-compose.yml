services:
  converter:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    volumes:
      - ../library:/library
      - ./data/hf-cache:/root/.cache/huggingface
      - ./data/manga-ocr-cache:/root/.cache/manga-ocr # comic-text-detector weight cache

  # Persistent GPU worker: drains yomekuro's upload job queue and polls
  # /library for manually-created "<name>-in/" folders.
  converter-worker:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    command: ["--watch", "--library", "/library"]
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "44"   # video
      - "992"  # render
    environment:
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
      ROCR_VISIBLE_DEVICES: "0"
      HIP_VISIBLE_DEVICES: "0"
      CONVERTER_DB: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      CONVERTER_POLL_INTERVAL: ${CONVERTER_POLL_INTERVAL:-10s}
      CONVERTER_PROGRESS_EVERY: ${CONVERTER_PROGRESS_EVERY:-10}
      CONVERTER_MOKURO_RETRIES: ${CONVERTER_MOKURO_RETRIES:-3}
      CONVERTER_MOKURO_RETRY_DELAY: ${CONVERTER_MOKURO_RETRY_DELAY:-5s}
    volumes:
      - ../library:/library
      - ./data/hf-cache:/root/.cache/huggingface
      - ./data/manga-ocr-cache:/root/.cache/manga-ocr

  converter-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "44"   # video
      - "992"  # render
    environment:
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
      ROCR_VISIBLE_DEVICES: "0"
      HIP_VISIBLE_DEVICES: "0"
    volumes:
      - ../library:/library
      - ./data/hf-cache:/root/.cache/huggingface
      - ./data/manga-ocr-cache:/root/.cache/manga-ocr # comic-text-detector weight cache
