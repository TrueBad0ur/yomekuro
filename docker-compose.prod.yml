# Production: pulls pre-built images, never builds locally.
#   docker compose -f docker-compose.prod.yml pull && up -d
# For local builds use docker-compose.yml / docker-compose.dev.yml instead.

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  yomekuro:
    image: truebad0ur/yomekuro:${YOMEKURO_VERSION}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      YOMEKURO_DB: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      YOMEKURO_DATA: /data
      YOMEKURO_BACKUP_DIR: /backup
      YOMEKURO_ADDR: ":8080"
      YOMEKURO_ADMIN_USER: ${YOMEKURO_ADMIN_USER:-admin}
      YOMEKURO_ADMIN_PASSWORD: ${YOMEKURO_ADMIN_PASSWORD}
      YOMEKURO_JOBS_POLL_INTERVAL_MS: ${YOMEKURO_JOBS_POLL_INTERVAL_MS:-20000}
      YOMEKURO_ZIP_CACHE_SIZE: ${YOMEKURO_ZIP_CACHE_SIZE:-20}
    volumes:
      - ./library:/library
      - ./data/app:/data
      - ./backup:/backup
    ports:
      - "8080:8080"

  # Persistent GPU worker for manga uploads made through the UI.
  converter-worker:
    image: truebad0ur/converter:gpu-${CONVERTER_VERSION}
    command: ["--watch", "--library", "/library"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    devices:
      - /dev/dri:/dev/dri
      - /dev/kfd:/dev/kfd
    group_add:
      - "44"   # video
      - "992"  # render
    environment:
      HSA_OVERRIDE_GFX_VERSION: "10.3.0"
      ROCR_VISIBLE_DEVICES: "0"
      HIP_VISIBLE_DEVICES: "0"
      CONVERTER_DB: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable"
      CONVERTER_POLL_INTERVAL: ${CONVERTER_POLL_INTERVAL:-10s}
      CONVERTER_PROGRESS_EVERY: ${CONVERTER_PROGRESS_EVERY:-10}
      CONVERTER_MOKURO_RETRIES: ${CONVERTER_MOKURO_RETRIES:-3}
      CONVERTER_MOKURO_RETRY_DELAY: ${CONVERTER_MOKURO_RETRY_DELAY:-5s}
    volumes:
      - ./library:/library
      - ./data/hf-cache:/root/.cache/huggingface
      - ./data/manga-ocr-cache:/root/.cache/manga-ocr
