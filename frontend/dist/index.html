<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yomekuro</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    (function() {
      document.documentElement.setAttribute(
        'data-theme', localStorage.getItem('theme') || 'dark'
      );
    })();
  </script>
</head>
<body class="page-library">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <a class="logo" id="logo-home">よめくろ</a>
      <button class="sidebar-close" id="sidebar-close" aria-label="Close">✕</button>
    </div>

    <nav class="sidebar-nav">
      <button class="nav-item active" id="nav-all-titles">All Titles</button>
      <div class="nav-section-label">Libraries</div>
      <div class="library-groups" id="library-groups">
        <span class="nav-loading">Loading…</span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <a class="footer-btn footer-link" href="/settings">Settings</a>
    </div>
  </aside>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <div class="main-wrap">
    <header class="main-header">
      <button class="hamburger" id="hamburger" aria-label="Open sidebar">☰</button>
      <nav class="breadcrumb" id="breadcrumb" hidden>
        <button id="btn-back" class="breadcrumb-back">Library</button>
        <span class="breadcrumb-sep">/</span>
      </nav>
      <span class="view-title" id="view-title">Library</span>
      <div class="header-theme-switcher theme-switcher" id="header-theme-switcher">
        <button class="theme-opt" data-theme="dark"  id="btn-dark">Dark</button>
        <button class="theme-opt" data-theme="light" id="btn-light">Light</button>
      </div>
    </header>

    <div class="filter-bar">
      <div class="search-row">
        <input type="search" id="search-input" placeholder="Search titles…" autocomplete="off">
        <button id="btn-search">Search</button>
      </div>
      <div class="genre-row">
        <span class="genre-label">Genres</span>
        <div class="tag-chips" id="tag-chips">
          <span class="tag-chips-empty" id="tag-chips-empty" hidden></span>
        </div>
      </div>
    </div>

    <main>
      <div id="books-grid" class="books-grid"></div>
      <p id="empty-msg" class="empty-msg" hidden></p>
    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
