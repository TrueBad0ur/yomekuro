<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yomekuro</title>
  <link rel="stylesheet" href="/style.css">
  <script>
    (function() {
      document.documentElement.setAttribute(
        'data-theme', localStorage.getItem('theme') || 'dark'
      );
    })();
  </script>
</head>
<body class="page-reader">
  <nav class="reader-nav app-chrome">
    <a class="nav-home" href="/">Library</a>
    <span class="nav-title" id="nav-title"></span>
    <span class="nav-info" id="nav-info"></span>
    <div class="nav-buttons">
      <button id="btn-spread" style="display:none">Spread</button>
      <button id="btn-toc">Contents</button>
      <button id="btn-prev" disabled>Prev</button>
      <button id="btn-next" disabled>Next</button>
    </div>
  </nav>

  <div id="reader-content"><p id="loading" style="padding:2rem;color:#888">Loading…</p></div>

  <nav class="reader-bottom-nav app-chrome">
    <button id="btn-prev-b" disabled>Prev</button>
    <span id="bottom-info"></span>
    <button id="btn-next-b" disabled>Next</button>
  </nav>

  <!-- TOC panel -->
  <div class="toc-overlay" id="toc-overlay"></div>
  <aside class="toc-panel" id="toc-panel">
    <div class="toc-panel-header app-chrome">
      <span class="toc-panel-title">Contents</span>
      <button class="toc-close" id="toc-close">✕</button>
    </div>
    <div class="toc-list" id="toc-list"></div>
  </aside>

  <script src="/reader.js"></script>
</body>
</html>
